<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SupBizAI — OG Image Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0A0A0F;
      font-family: 'Arial Black', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }
    .content {
      text-align: center;
      z-index: 10;
      padding: 2rem;
    }
    .logo {
      font-size: 72px;
      font-weight: 900;
      color: white;
      margin-bottom: 1rem;
      letter-spacing: -2px;
    }
    .logo span {
      background: linear-gradient(135deg, #7C3AED, #10B981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 32px;
      color: #A1A1AA;
      font-weight: 400;
      font-family: Arial, sans-serif;
      max-width: 700px;
      line-height: 1.4;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-block;
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.5);
      color: #9D5FFF;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      font-size: 20px;
      font-family: Arial, sans-serif;
    }
    .instruction {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.1);
      padding: 1rem;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-family: Arial, sans-serif;
      max-width: 300px;
      backdrop-filter: blur(10px);
    }
    .instruction h3 {
      margin-bottom: 0.5rem;
      color: #9D5FFF;
    }
  </style>
</head>
<body>
  <!-- Инструкция -->
  <div class="instruction">
    <h3>📸 Как создать OG Image:</h3>
    <ol style="margin-left: 1rem; line-height: 1.8;">
      <li>Нажми F12</li>
      <li>Ctrl+Shift+P → Screenshot</li>
      <li>Выбери "Capture full size"</li>
      <li>Обрежь до 1200×630px</li>
      <li>Сохраните как og-image.png</li>
    </ol>
  </div>

  <!-- Фоновые пятна -->
  <div class="bg-circle" style="
    width:500px; height:500px;
    background:#7C3AED;
    opacity:0.15;
    top:-100px; left:-100px;
  "></div>
  <div class="bg-circle" style="
    width:400px; height:400px;
    background:#10B981;
    opacity:0.1;
    bottom:-50px; right:-50px;
  "></div>

  <div class="content">
    <div class="logo">Sup<span>Biz</span>AI</div>
    <div class="tagline">Ваш бизнес работает пока вы спите</div>
    <div class="badge">⚡ AI Автоматизация бизнес-процессов</div>
  </div>
</body>
</html>
